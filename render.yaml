services:
  - type: web
    name: policy-navigator-api
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # FastAPI 서버(main.py 안의 app)를 실행하는 핵심 명령어
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false