# .github/workflows/sync_db.yml
name: Daily Welfare & Youth Data Sync
on:
  schedule:
    - cron: '0 19 * * *'   # 매일 KST 새벽 4시 (UTC 19:00)
  workflow_dispatch:       # GitHub 페이지에서 수동으로 버튼 눌러서 실행 가능하게 하는 옵션!
jobs:
  update-db:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase python-dotenv langchain-openai openai
      - name: Run Welfare Sync (Bojogeum & Bokjiro)
        env:
          PUBLIC_DATA_PORTAL_KEY: ${{ secrets.PUBLIC_DATA_PORTAL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/sync_welfare.py
      - name: Run Youth Policy Sync
        if: always()  # 복지로 수집이 실패해도 청년 정책은 무조건 실행!
        env:
          YOUTH_POLICY_API_KEY: ${{ secrets.YOUTH_POLICY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/sync_youth.py

      # 🌟 sync 후 NULL URL 자동 백필: 새로 들어온 정책 중 URL이 비어있으면 네이버 검색으로 채움
      - name: Backfill NULL URLs
        if: always()  # sync가 실패해도 기존 NULL URL은 채울 수 있으니 무조건 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/backfill_urls.py --apply

      - name: Upload backfill log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-log
          path: backfill_urls_*.jsonl
          retention-days: 14
