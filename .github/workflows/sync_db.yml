# .github/workflows/sync_db.yml
name: Daily Welfare & Youth Data Sync

on:
  schedule:
    - cron: '0 19 * * *'   # 매일 KST 새벽 4시 (UTC 19:00)
  workflow_dispatch:       # GitHub 페이지에서 수동으로 버튼 눌러서 실행 가능하게 하는 옵션!

jobs:
  update-db:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase python-dotenv langchain-openai openai

      - name: Run Welfare Sync (Bojogeum & Bokjiro)
        env:
          PUBLIC_DATA_PORTAL_KEY: ${{ secrets.PUBLIC_DATA_PORTAL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/sync_welfare.py

      - name: Run Youth Policy Sync
        if: always()  # 복지로 수집이 실패해도 청년 정책은 무조건 실행!
        env:
          YOUTH_POLICY_API_KEY: ${{ secrets.YOUTH_POLICY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/sync_youth.py
