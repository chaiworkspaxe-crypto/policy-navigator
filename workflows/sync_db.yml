name: Daily Welfare Data Sync

on:
  schedule:
    # 매일 한국 시간 새벽 4시 (UTC 기준 19시)에 자동 실행
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 🌟 두 스크립트 모두에 필요한 패키지를 한 번에 설치해!
          pip install requests supabase python-dotenv langchain-openai duckduckgo-search

      # ✅ STAGE 1: 보조금24 & 복지로 수집
      - name: Run Welfare Sync (Bojogeum & Bokjiro)
        env:
          PUBLIC_DATA_PORTAL_KEY: ${{ secrets.PUBLIC_DATA_PORTAL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/sync_welfare.py

      # ✅ STAGE 2: 온라인청년센터 수집
      - name: Run Youth Policy Sync
        # 🌟 (시니어 꿀팁) 만약 Stage 1에서 치명적인 파이썬 에러가 나도, Stage 2는 무조건 실행하게 만드는 마법의 옵션!
        if: always() 
        env:
          YOUTH_POLICY_API_KEY: ${{ secrets.YOUTH_POLICY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 🌟 파일명을 실제 창현이가 만든 이름으로 수정 완료!
          python scripts/sync_youth.py
